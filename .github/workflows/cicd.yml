name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t node-cicd-api .

      - name: Run Docker container (smoke test)
        run: |
          docker run -d -p 3000:3000 --name test-api node-cicd-api
          sleep 3
          curl http://localhost:3000/health